<style>
  :root{
    --fog:#ECEBED;
    --ink:#141414;
    --coral:#E8483F;
    --mist:#87878C;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Archivo',system-ui,sans-serif;
    background:var(--fog);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--coral);color:#fff}

  /* ---- intro ---- */
  .intro{
    max-width:820px;margin:0 auto;
    padding:clamp(56px,10vh,110px) 24px clamp(36px,6vh,64px);
    text-align:center;
  }
  .mark{
    font-weight:800;font-size:26px;letter-spacing:.01em;
  }
  .mark span{color:var(--coral)}
  .intro h1{
    font-size:clamp(20px,3vw,26px);
    font-weight:600;margin-top:26px;letter-spacing:.01em;
  }
  .intro .role{
    font-size:13px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--mist);margin-top:8px;font-weight:500;
  }
  .intro .script{
    font-family:'Caveat',cursive;font-size:26px;color:var(--coral);
    display:block;margin-top:18px;transform:rotate(-1.5deg);
  }
  .links{
    margin-top:26px;display:flex;justify-content:center;gap:22px;flex-wrap:wrap;
    font-size:13.5px;
  }
  .links a{color:var(--ink);text-decoration:none;border-bottom:1px solid rgba(20,20,20,.25);padding-bottom:2px}
  .links a:hover{color:var(--coral);border-color:var(--coral)}

  /* ---- pages ---- */
  .pages{max-width:1060px;margin:0 auto;padding:0 16px 40px}
  .pages img{
    display:block;width:100%;height:auto;
    margin:0 0 clamp(14px,2.5vh,26px);
    box-shadow:0 6px 26px rgba(20,20,20,.10);
    border-radius:2px;
  }

  /* ---- footer ---- */
  footer{
    text-align:center;padding:30px 24px 56px;
  }
  .btn{
    display:inline-block;text-decoration:none;
    background:var(--ink);color:var(--fog);
    font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;
    padding:15px 30px;border-radius:99px;
  }
  .btn:hover{background:var(--coral);color:#fff}
  footer p{font-size:12.5px;color:var(--mist);margin-top:26px}
</style>
</head>
